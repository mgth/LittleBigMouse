<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="32"
   height="32"
   viewBox="0 0 32 32"
   version="1.1"
   id="svgWallpaper"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Monitor body copied from Monitor.svg: full black swaps to the theme foreground. -->
  <g transform="translate(0,4)">
    <rect
       style="fill:none;stroke:#000000;stroke-width:3;stroke-linejoin:round;stroke-miterlimit:4;stroke-dasharray:none"
       width="29"
       height="16"
       x="1.5"
       y="1.5"
       ry="2" />
    <rect
       style="fill:#000000;stroke:#000000;stroke-width:0;stroke-linejoin:round;stroke-miterlimit:4;stroke-dasharray:none"
       width="8"
       height="8"
       x="12"
       y="16" />
    <rect
       style="fill:#999999;stroke:#000000;stroke-width:0;stroke-linejoin:round;stroke-miterlimit:4;stroke-dasharray:none"
       width="2"
       height="1"
       x="15"
       y="17" />
    <!-- The wallpaper: sun and mountains in the accent color, inside the screen. -->
    <circle
       style="fill:#0078d7"
       cx="9"
       cy="7"
       r="2" />
    <path
       style="fill:#0078d7"
       d="M 4,15 10,9 14,13 18,8 27,15 Z" />
  </g>
</svg>
