# Validate Windows and Linux before producing portable or installer artifacts.
# Tag builds create a draft release only after both platform jobs pass.

name: Build and test

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  UI_PROJECT: LittleBigMouse.Ui\LittleBigMouse.Ui.Avalonia\LittleBigMouse.Ui.Avalonia.csproj
  HOOK_RUST_PROJECT: LittleBigMouse-Hook-Rust\Cargo.toml
  UI_OUTPUT: LittleBigMouse.Ui\LittleBigMouse.Ui.Avalonia\bin\x64\Release\net10.0

jobs:
  windows:
    name: Windows ${{ matrix.configuration }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        submodules: recursive

    - name: Install .NET SDK
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: 10.0.x

    - name: Derive version from tag
      id: ver
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $version = "${{ github.ref_name }}" -replace '^v', ''
        } else {
          $version = ""
        }
        "version=$version" >> $env:GITHUB_OUTPUT

    - name: Build UI
      shell: pwsh
      run: |
        $buildArgs = @('-c', '${{ matrix.configuration }}', '-p:Platform=x64')
        if ("${{ steps.ver.outputs.version }}") {
          $buildArgs += '-p:Version=${{ steps.ver.outputs.version }}'
        }
        dotnet build $env:UI_PROJECT @buildArgs

    - name: Test display layout
      run: >-
        dotnet test
        LittleBigMouse.Core\LittleBigMouse.DisplayLayout.Tests\LittleBigMouse.DisplayLayout.Tests.csproj
        -c ${{ matrix.configuration }} -p:Platform=x64

    - name: Test VCP and smart-TV protocols
      run: >-
        dotnet test
        LittleBigMouse.Plugins\LittleBigMouse.Plugin.Vcp.Avalonia.Tests\LittleBigMouse.Plugin.Vcp.Avalonia.Tests.csproj
        -c ${{ matrix.configuration }} -p:Platform=x64

    - name: Test UI lifecycle
      run: >-
        dotnet test
        LittleBigMouse.Ui\LittleBigMouse.Ui.Avalonia.Tests\LittleBigMouse.Ui.Avalonia.Tests.csproj
        -c ${{ matrix.configuration }} -p:Platform=x64

    - name: Check NuGet vulnerabilities
      if: matrix.configuration == 'Release'
      run: dotnet list LittleBigMouse.sln package --vulnerable --include-transitive

    - name: Check Rust formatting
      if: matrix.configuration == 'Release'
      run: cargo fmt --all --manifest-path $env:HOOK_RUST_PROJECT -- --check

    - name: Test all Rust targets
      if: matrix.configuration == 'Release'
      run: cargo test --all-targets --manifest-path $env:HOOK_RUST_PROJECT

    - name: Lint all Rust targets
      if: matrix.configuration == 'Release'
      run: cargo clippy --all-targets --manifest-path $env:HOOK_RUST_PROJECT -- -D warnings

    - name: Audit Rust dependencies
      if: matrix.configuration == 'Release'
      shell: pwsh
      run: |
        cargo install cargo-audit --locked --version 0.22.2
        cargo audit --file LittleBigMouse-Hook-Rust\Cargo.lock

    - name: Build Rust hook
      if: matrix.configuration == 'Release'
      run: cargo build --release --manifest-path $env:HOOK_RUST_PROJECT

    - name: Stage Rust hook
      if: matrix.configuration == 'Release'
      shell: pwsh
      run: Copy-Item LittleBigMouse-Hook-Rust\target\release\lbm-hook.exe (Join-Path $env:UI_OUTPUT 'LittleBigMouse.Hook.exe')

    - name: Upload portable artifact
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: LittleBigMouse-portable
        path: |
          ${{ env.UI_OUTPUT }}
          !${{ env.UI_OUTPUT }}\runtimes\linux*\**
          !${{ env.UI_OUTPUT }}\runtimes\osx*\**

    - name: Compile installer
      if: matrix.configuration == 'Release' && startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: >-
        & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        "/DAppVer=${{ steps.ver.outputs.version }}"
        LittleBigMouse.Setup\LittleBigMouse.iss

    - name: Upload installer artifact
      if: matrix.configuration == 'Release' && startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: LittleBigMouse-installer
        path: LittleBigMouse.Setup\LittleBigMouse_*.exe

  rust-linux:
    name: Rust Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        submodules: recursive

    - name: Install native build prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install --yes libwayland-dev libxkbcommon-dev

    - name: Check formatting
      run: cargo fmt --all --manifest-path LittleBigMouse-Hook-Rust/Cargo.toml -- --check

    - name: Test all targets
      run: cargo test --all-targets --manifest-path LittleBigMouse-Hook-Rust/Cargo.toml

    - name: Lint all targets
      run: cargo clippy --all-targets --manifest-path LittleBigMouse-Hook-Rust/Cargo.toml -- -D warnings

  release:
    name: Draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ windows, rust-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download installer
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: LittleBigMouse-installer
        path: release

    - name: Create draft release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        draft: true
        name: ${{ github.ref_name }}
        files: release/LittleBigMouse_*.exe
        generate_release_notes: true
        body: |
          If Little Big Mouse is useful to you, consider [sponsoring the project](https://github.com/sponsors/mgth).
